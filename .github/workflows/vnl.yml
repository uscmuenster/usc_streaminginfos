name: Germany VNL Daily Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * *' # täglich um 01:30 UTC

permissions:
  contents: write

concurrency:
  group: 'germany-vnl'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ✅ Check sources compile
        run: python -m compileall src scripts

      - name: 🛠 Generate Germany VNL page
        run: python scripts/update_germany_vnl.py

      - name: 💾 Commit updated Germany VNL page
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add docs/germany_vnl.html
          if git diff --cached --quiet; then
            echo "Keine Änderungen zum Committen."
          else
            git commit -m "chore(vnl): daily refresh germany_vnl page"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

      - name: 🚀 Deploy to gh-pages branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          mkdir -p /tmp/ghpages
          cp -r docs/* /tmp/ghpages/

          git fetch origin
          git checkout --orphan gh-pages
          git reset --hard
          rm -rf *

          cp -r /tmp/ghpages/* .
          touch .nojekyll

          git add -A
          git commit -m "🚀 Deploy VNL $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push -f origin gh-pages
